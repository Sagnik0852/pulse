name: daily-scrape
on:
  schedule:
    - cron: "30 0 * * *"        # 06:00 IST
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scraper/play_store.py
      - run: python nlp/run_pipeline.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: commit data
        run: |
          git config user.name "pulse-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git commit -m "daily data refresh" || echo "no changes"
          git push

name: bootstrap-pipeline
# One-click first run: scrape -> label -> models -> digest -> commit everything.
# Trigger manually from the Actions tab. After this succeeds once, the
# daily-scrape and weekly-digest schedules keep the data fresh.
on:
  workflow_dispatch:
jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Scrape Play Store reviews (all 5 apps)
        run: python scraper/play_store.py
      - name: NLP pipeline (taxonomy + Claude labeling + spike alerts)
        run: python nlp/run_pipeline.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Models (synth data, segments, churn, recommender)
        run: |
          python models/synth_data.py
          python models/segments.py
          python models/churn.py
          python models/recommender.py
      - name: First CEO digest
        run: python llm/digest.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit data back to repo
        run: |
          git config user.name "pulse-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git commit -m "bootstrap: initial scrape + labels + models + digest" || echo "no changes"
          git push
